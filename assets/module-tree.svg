<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 580" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13">
  <style>
    .box        { fill: none; stroke: #6b7280; stroke-width: 1.4; rx: 6; ry: 6; }
    .box-root   { fill: #eef2ff; stroke: #4f46e5; }
    .box-engine { fill: #fef3c7; stroke: #d97706; }
    .box-data   { fill: #ecfeff; stroke: #0891b2; }
    .box-kv     { fill: #f0fdf4; stroke: #16a34a; }
    .box-chat   { fill: #fdf4ff; stroke: #9333ea; }
    .box-samp   { fill: #fff7ed; stroke: #ea580c; }
    .box-tools  { fill: #fdf2f8; stroke: #db2777; }
    .box-util   { fill: #f5f5f4; stroke: #78716c; }
    .label      { fill: #1f2937; font-weight: 600; font-size: 13px; }
    .sub        { fill: #4b5563; font-size: 11px; }
    .group      { fill: #1f2937; font-weight: 700; font-size: 12px; }
    .link       { stroke: #9ca3af; stroke-width: 1; fill: none; }
    @media (prefers-color-scheme: dark) {
      .box        { stroke: #9ca3af; }
      .box-root   { fill: #1e1b4b; stroke: #818cf8; }
      .box-engine { fill: #422006; stroke: #fbbf24; }
      .box-data   { fill: #083344; stroke: #22d3ee; }
      .box-kv     { fill: #14532d; stroke: #4ade80; }
      .box-chat   { fill: #4a044e; stroke: #d946ef; }
      .box-samp   { fill: #431407; stroke: #fb923c; }
      .box-tools  { fill: #500724; stroke: #f472b6; }
      .box-util   { fill: #1c1917; stroke: #a8a29e; }
      .label      { fill: #e5e7eb; }
      .sub, .group { fill: #d1d5db; }
      .link       { stroke: #6b7280; }
    }
  </style>

  <!-- Root -->
  <rect class="box box-root" x="390" y="20" width="160" height="50"/>
  <text class="label" x="470" y="42" text-anchor="middle">ion7.llm</text>
  <text class="sub"   x="470" y="58" text-anchor="middle">init.lua — lazy façade</text>

  <!-- Two top-level engines -->
  <rect class="box box-engine" x="60"  y="110" width="180" height="60"/>
  <text class="label" x="150" y="132" text-anchor="middle">Engine</text>
  <text class="sub"   x="150" y="148" text-anchor="middle">single-session</text>
  <text class="sub"   x="150" y="162" text-anchor="middle">chat / stream / complete</text>

  <rect class="box box-engine" x="270" y="110" width="180" height="60"/>
  <text class="label" x="360" y="132" text-anchor="middle">Pool</text>
  <text class="sub"   x="360" y="148" text-anchor="middle">multi-session</text>
  <text class="sub"   x="360" y="162" text-anchor="middle">one batch per tick · ~6× speedup</text>

  <!-- Data classes -->
  <rect class="box box-data" x="490" y="110" width="180" height="60"/>
  <text class="label" x="580" y="132" text-anchor="middle">Session  ·  Response</text>
  <text class="sub"   x="580" y="148" text-anchor="middle">message history</text>
  <text class="sub"   x="580" y="162" text-anchor="middle">per-seq KV bookkeeping</text>

  <rect class="box box-data" x="700" y="110" width="180" height="60"/>
  <text class="label" x="790" y="132" text-anchor="middle">Embed  ·  Stop</text>
  <text class="sub"   x="790" y="148" text-anchor="middle">embedding pipeline</text>
  <text class="sub"   x="790" y="162" text-anchor="middle">multi-token stop detector</text>

  <!-- Sub-namespace : kv -->
  <text class="group" x="60" y="210">kv/   shared-context KV orchestration</text>
  <rect class="box box-kv" x="60"  y="220" width="100" height="52"/>
  <text class="label" x="110" y="240" text-anchor="middle">Slots</text>
  <text class="sub"   x="110" y="258" text-anchor="middle">seq_id pool</text>

  <rect class="box box-kv" x="180" y="220" width="120" height="52"/>
  <text class="label" x="240" y="240" text-anchor="middle">Prefix</text>
  <text class="sub"   x="240" y="258" text-anchor="middle">system prompt cache</text>

  <rect class="box box-kv" x="320" y="220" width="120" height="52"/>
  <text class="label" x="380" y="240" text-anchor="middle">snapshot</text>
  <text class="sub"   x="380" y="258" text-anchor="middle">per-seq save / restore</text>

  <rect class="box box-kv" x="460" y="220" width="120" height="52"/>
  <text class="label" x="520" y="240" text-anchor="middle">eviction</text>
  <text class="sub"   x="520" y="258" text-anchor="middle">message · fifo + sink_fn</text>

  <rect class="box box-kv" x="600" y="220" width="120" height="52"/>
  <text class="label" x="660" y="240" text-anchor="middle">radix</text>
  <text class="sub"   x="660" y="258" text-anchor="middle">exact-match cache</text>

  <rect class="box box-kv" x="740" y="220" width="180" height="52"/>
  <text class="label" x="830" y="240" text-anchor="middle">ContextManager</text>
  <text class="sub"   x="830" y="258" text-anchor="middle">prepare · make_room · fork</text>

  <!-- Sub-namespace : chat -->
  <text class="group" x="60" y="305">chat/   render + per-token demux + post-parse</text>
  <rect class="box box-chat" x="60"  y="315" width="170" height="52"/>
  <text class="label" x="145" y="335" text-anchor="middle">Template</text>
  <text class="sub"   x="145" y="353" text-anchor="middle">vocab:apply_template wrapper</text>

  <rect class="box box-chat" x="250" y="315" width="170" height="52"/>
  <text class="label" x="335" y="335" text-anchor="middle">Thinking</text>
  <text class="sub"   x="335" y="353" text-anchor="middle">&lt;think&gt; state machine</text>

  <rect class="box box-chat" x="440" y="315" width="170" height="52"/>
  <text class="label" x="525" y="335" text-anchor="middle">tool_stream</text>
  <text class="sub"   x="525" y="353" text-anchor="middle">live tool_call_delta SM</text>

  <rect class="box box-chat" x="630" y="315" width="140" height="52"/>
  <text class="label" x="700" y="335" text-anchor="middle">parse</text>
  <text class="sub"   x="700" y="353" text-anchor="middle">post-gen + format hint</text>

  <rect class="box box-chat" x="790" y="315" width="140" height="52"/>
  <text class="label" x="860" y="335" text-anchor="middle">stream</text>
  <text class="sub"   x="860" y="353" text-anchor="middle">5-kind constructors</text>

  <!-- Sub-namespace : sampler -->
  <text class="group" x="60" y="395">sampler/   chat-oriented sampler shortcuts</text>
  <rect class="box box-samp" x="60"  y="405" width="350" height="52"/>
  <text class="label" x="235" y="425" text-anchor="middle">profiles</text>
  <text class="sub"   x="235" y="443" text-anchor="middle">balanced / precise / creative / code / fast / thinking</text>

  <rect class="box box-samp" x="430" y="405" width="220" height="52"/>
  <text class="label" x="540" y="425" text-anchor="middle">budget</text>
  <text class="sub"   x="540" y="443" text-anchor="middle">reasoning_budget step</text>

  <rect class="box box-util" x="670" y="405" width="260" height="52"/>
  <text class="label" x="800" y="425" text-anchor="middle">structured output</text>
  <text class="sub"   x="800" y="443" text-anchor="middle">→ delegated to ion7-grammar</text>

  <!-- Sub-namespace : tools + util -->
  <text class="group" x="60" y="485">tools/                                                                                                       util/</text>
  <rect class="box box-tools" x="60"  y="495" width="240" height="36"/>
  <text class="label" x="180" y="515" text-anchor="middle">Tool · ToolSet</text>

  <rect class="box box-tools" x="320" y="495" width="280" height="36"/>
  <text class="label" x="460" y="515" text-anchor="middle">loop  ·  interleaved-thinking dispatcher</text>

  <rect class="box box-util" x="620" y="495" width="310" height="36"/>
  <text class="label" x="775" y="515" text-anchor="middle">messages · partial_json · log</text>

  <!-- Façade arrows down -->
  <path class="link" d="M 470 70  L 470 90  L 150 90  L 150 110"/>
  <path class="link" d="M 470 90  L 360 90  L 360 110"/>
  <path class="link" d="M 470 90  L 580 90  L 580 110"/>
  <path class="link" d="M 470 90  L 790 90  L 790 110"/>

</svg>
