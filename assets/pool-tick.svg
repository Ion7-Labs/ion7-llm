<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13">
  <style>
    .box       { fill: none; stroke: #6b7280; stroke-width: 1.4; rx: 6; ry: 6; }
    .box-slot  { fill: #eef2ff; stroke: #4f46e5; }
    .box-drain { fill: #fef3c7; stroke: #d97706; }
    .box-evict { fill: #fee2e2; stroke: #dc2626; }
    .box-pack  { fill: #f0fdf4; stroke: #16a34a; }
    .box-dec   { fill: #ecfeff; stroke: #0891b2; }
    .box-samp  { fill: #fdf4ff; stroke: #9333ea; }
    .box-out   { fill: #fdf2f8; stroke: #db2777; }
    .label     { fill: #1f2937; font-weight: 600; }
    .sub       { fill: #4b5563; font-size: 11px; }
    .group     { fill: #1f2937; font-weight: 700; font-size: 12px; }
    .arrow     { stroke: #6b7280; stroke-width: 1.4; fill: none; marker-end: url(#tip); }
    .arrow-loop{ stroke: #16a34a; stroke-width: 1.4; fill: none; marker-end: url(#tip-g); stroke-dasharray: 5 3; }
    @media (prefers-color-scheme: dark) {
      .box       { stroke: #9ca3af; }
      .box-slot  { fill: #1e1b4b; stroke: #818cf8; }
      .box-drain { fill: #422006; stroke: #fbbf24; }
      .box-evict { fill: #450a0a; stroke: #f87171; }
      .box-pack  { fill: #14532d; stroke: #4ade80; }
      .box-dec   { fill: #083344; stroke: #22d3ee; }
      .box-samp  { fill: #4a044e; stroke: #d946ef; }
      .box-out   { fill: #500724; stroke: #f472b6; }
      .label     { fill: #e5e7eb; }
      .sub       { fill: #d1d5db; }
      .group     { fill: #e5e7eb; }
      .arrow     { stroke: #9ca3af; }
      .arrow-loop{ stroke: #4ade80; }
    }
  </style>

  <defs>
    <marker id="tip" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
    <marker id="tip-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
  </defs>

  <text class="group" x="20" y="24">Pool:tick — N concurrent sessions, ONE llama_decode call</text>

  <!-- Slots column on the left -->
  <rect class="box box-slot" x="20"  y="60" width="170" height="56"/>
  <text class="label" x="105" y="84" text-anchor="middle">Slot · Session 1</text>
  <text class="sub"   x="105" y="100" text-anchor="middle">seq_id=1 · n_past=312</text>
  <text class="sub"   x="105" y="112" text-anchor="middle">next_tok = sampled prev tick</text>

  <rect class="box box-slot" x="20" y="130" width="170" height="56"/>
  <text class="label" x="105" y="154" text-anchor="middle">Slot · Session 2</text>
  <text class="sub"   x="105" y="170" text-anchor="middle">seq_id=2 · n_past=488</text>
  <text class="sub"   x="105" y="182" text-anchor="middle">next_tok = sampled prev tick</text>

  <rect class="box box-slot" x="20" y="200" width="170" height="56"/>
  <text class="label" x="105" y="224" text-anchor="middle">Slot · Session 3</text>
  <text class="sub"   x="105" y="240" text-anchor="middle">seq_id=3 · n_past=104</text>
  <text class="sub"   x="105" y="252" text-anchor="middle">next_tok = sampled prev tick</text>

  <!-- Phase 1 : Drain -->
  <rect class="box box-drain" x="220" y="60" width="200" height="200"/>
  <text class="label" x="320" y="86" text-anchor="middle">1. Drain</text>
  <text class="sub" x="320" y="110" text-anchor="middle">consume next_tok</text>
  <text class="sub" x="320" y="126" text-anchor="middle">for each active slot :</text>
  <text class="sub" x="320" y="142" text-anchor="middle">• append to raw_parts</text>
  <text class="sub" x="320" y="158" text-anchor="middle">• thinking_sm:feed</text>
  <text class="sub" x="320" y="174" text-anchor="middle">• tool_stream:feed (live deltas)</text>
  <text class="sub" x="320" y="190" text-anchor="middle">• stop:feed</text>
  <text class="sub" x="320" y="206" text-anchor="middle">• check max_tokens / EOG</text>
  <text class="sub" x="320" y="226" text-anchor="middle">terminal slots dropped</text>
  <text class="sub" x="320" y="242" text-anchor="middle">survivors → to_decode[]</text>

  <!-- Phase 1.5 : Mid-gen eviction (per slot) -->
  <rect class="box box-evict" x="450" y="60" width="200" height="200"/>
  <text class="label" x="550" y="86" text-anchor="middle">1.5  Mid-gen evict</text>
  <text class="sub" x="550" y="106" text-anchor="middle">per-slot guard</text>
  <text class="sub" x="550" y="130" text-anchor="middle">for each survivor :</text>
  <text class="sub" x="550" y="148" text-anchor="middle">if n_past + 1 + safety</text>
  <text class="sub" x="550" y="164" text-anchor="middle">       &gt; n_ctx_seq :</text>
  <text class="sub" x="550" y="186" text-anchor="middle">cm:make_room(slot.session,</text>
  <text class="sub" x="550" y="202" text-anchor="middle">              evict_chunk)</text>
  <text class="sub" x="550" y="224" text-anchor="middle">freed == 0 → terminal</text>
  <text class="sub" x="550" y="240" text-anchor="middle">freed &gt; 0  → keeps going</text>

  <!-- Phase 2 : Pack -->
  <rect class="box box-pack" x="680" y="60" width="240" height="200"/>
  <text class="label" x="800" y="86" text-anchor="middle">2. Pack</text>
  <text class="sub" x="800" y="110" text-anchor="middle">build private llama_batch</text>
  <text class="sub" x="800" y="130" text-anchor="middle">one row per surviving slot :</text>
  <text class="sub" x="800" y="150" text-anchor="middle">b.token[i]    = next_tok</text>
  <text class="sub" x="800" y="168" text-anchor="middle">b.pos[i]      = n_past</text>
  <text class="sub" x="800" y="186" text-anchor="middle">b.seq_id[i][0]= slot.seq_id</text>
  <text class="sub" x="800" y="204" text-anchor="middle">b.logits[i]   = 1</text>
  <text class="sub" x="800" y="226" text-anchor="middle">b.n_tokens    = #to_decode</text>

  <!-- Phase 3 : Decode -->
  <rect class="box box-dec" x="450" y="290" width="200" height="80"/>
  <text class="label" x="550" y="316" text-anchor="middle">3. Decode</text>
  <text class="sub" x="550" y="336" text-anchor="middle">single llama_decode call</text>
  <text class="sub" x="550" y="352" text-anchor="middle">N rows in one forward pass</text>

  <!-- Phase 4 : Sample -->
  <rect class="box box-samp" x="680" y="290" width="240" height="100"/>
  <text class="label" x="800" y="316" text-anchor="middle">4. Sample</text>
  <text class="sub" x="800" y="334" text-anchor="middle">for each row i :</text>
  <text class="sub" x="800" y="352" text-anchor="middle">slot.next_tok =</text>
  <text class="sub" x="800" y="370" text-anchor="middle">sampler:sample(ctx, i)</text>
  <text class="sub" x="800" y="386" text-anchor="middle">slot.session.n_past += 1</text>

  <!-- Linear arrows -->
  <path class="arrow" d="M 190 88  L 218 88"/>
  <path class="arrow" d="M 190 158 L 218 158"/>
  <path class="arrow" d="M 190 228 L 218 228"/>
  <path class="arrow" d="M 420 158 L 448 158"/>
  <path class="arrow" d="M 650 158 L 678 158"/>
  <path class="arrow" d="M 800 260 L 800 288"/>
  <path class="arrow" d="M 678 320 L 650 320"/>

  <!-- Loop back to slots -->
  <path class="arrow-loop" d="M 680 340 L 110 340 L 110 188"/>
  <text class="sub" x="395" y="335" text-anchor="middle">slot.next_tok ready for next tick</text>

  <!-- Termination -->
  <rect class="box box-out" x="220" y="410" width="700" height="80"/>
  <text class="label" x="570" y="436" text-anchor="middle">Pool:run — when every slot has terminated</text>
  <text class="sub" x="570" y="456" text-anchor="middle">_finalise(slot) for each : chat.parse.split → Response → session._last_response</text>
  <text class="sub" x="570" y="472" text-anchor="middle">snapshot.save(ctx, seq_id) → session._seq_snapshot ; on_chunk(slot, stop) fires last per slot</text>

</svg>
