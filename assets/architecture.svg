<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14">
  <style>
    .box      { fill: none; stroke: #6b7280; stroke-width: 1.5; rx: 8; ry: 8; }
    .box-app  { fill: #eef2ff; stroke: #4f46e5; }
    .box-llm  { fill: #fef3c7; stroke: #d97706; }
    .box-core { fill: #f0fdf4; stroke: #16a34a; }
    .box-base { fill: #fee2e2; stroke: #dc2626; }
    .label    { fill: #1f2937; font-weight: 600; }
    .sub      { fill: #4b5563; font-size: 12px; }
    .arrow    { stroke: #6b7280; stroke-width: 1.5; fill: none; marker-end: url(#tip); }
    .arrow-down { stroke: #9ca3af; stroke-width: 1.2; stroke-dasharray: 4 3; fill: none; marker-end: url(#tip); }
    @media (prefers-color-scheme: dark) {
      .box      { stroke: #9ca3af; }
      .box-app  { fill: #1e1b4b; stroke: #818cf8; }
      .box-llm  { fill: #422006; stroke: #fbbf24; }
      .box-core { fill: #14532d; stroke: #4ade80; }
      .box-base { fill: #450a0a; stroke: #f87171; }
      .label    { fill: #e5e7eb; }
      .sub      { fill: #9ca3af; }
      .arrow, .arrow-down { stroke: #9ca3af; }
    }
  </style>

  <defs>
    <marker id="tip" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Tier 1 : user application -->
  <rect class="box box-app" x="160" y="20" width="400" height="60"/>
  <text class="label" x="360" y="50" text-anchor="middle">Your Lua application</text>
  <text class="sub"   x="360" y="68" text-anchor="middle">chat agent · REPL · batch worker · interactive CLI</text>

  <!-- Tier 2 : ion7.llm -->
  <rect class="box box-llm" x="40" y="120" width="640" height="120"/>
  <text class="label" x="360" y="148" text-anchor="middle">ion7.llm   ·   chat pipeline + multi-session orchestration</text>
  <text class="sub"   x="360" y="172" text-anchor="middle">Engine  ·  Pool  ·  Session  ·  Response  ·  Embed  ·  Stop</text>
  <text class="sub"   x="360" y="192" text-anchor="middle">kv (Slots, Prefix, snapshot, eviction, ContextManager)</text>
  <text class="sub"   x="360" y="212" text-anchor="middle">chat (template, thinking, parse, stream)  ·  sampler (profiles, schema, budget)</text>
  <text class="sub"   x="360" y="230" text-anchor="middle">tools (Tool, ToolSet, loop)  ·  util (messages, partial_json, log)</text>

  <!-- Tier 3 : ion7.core -->
  <rect class="box box-core" x="80" y="280" width="560" height="90"/>
  <text class="label" x="360" y="308" text-anchor="middle">ion7.core   ·   silicon-level runtime</text>
  <text class="sub"   x="360" y="330" text-anchor="middle">Model · Context · Vocab · Sampler · Speculative · Threadpool</text>
  <text class="sub"   x="360" y="350" text-anchor="middle">FFI to llama.h / ggml*.h  +  ion7_bridge.so (libcommon adapters)</text>

  <!-- Tier 4 : llama.cpp -->
  <rect class="box box-base" x="80" y="400" width="560" height="60"/>
  <text class="label" x="360" y="428" text-anchor="middle">llama.cpp shared libraries</text>
  <text class="sub"   x="360" y="448" text-anchor="middle">libllama · libggml · libllama-common</text>

  <!-- Arrows -->
  <path class="arrow" d="M 360 80 L 360 118"/>
  <path class="arrow" d="M 360 240 L 360 278"/>
  <path class="arrow-down" d="M 360 370 L 360 398"/>
</svg>
